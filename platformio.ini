; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp12e]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
monitor_raw = yes

; メモリ分割：4MB中、プログラム2MB / FS 2MB
board_build.ldscript = eagle.flash.4m2m.ld
board_build.filesystem = littlefs

build_flags =
;   .pio\libdeps\esp12e\microrl-remaster\src\include\microrl の中の「microrl_user_config_template.h」をコピーし「microrl_user_config.h」を作成する
    -I.pio/libdeps/esp12e/microrl-remaster/src/include/microrl

lib_deps =
    arkhipenko/TaskScheduler@^4.0.4
    crankyoldgit/IRremoteESP8266@^2.9.0
    bblanchon/ArduinoJson@^7.4.3
    https://github.com/dimmykar/microrl-remaster.git#v2.6.0
